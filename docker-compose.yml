services:
  app:
    build: .
    container_name: expense-manager-server
    restart: always
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      # Uncomment the next line if you have the firebase service account key locally
      # - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT:-8000}/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
